
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otro Mundo - Gestión Académica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseDB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #1E3A8A; color: white; margin: 0; padding: 0; }
        .om-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; line-height: 0.85; }
        
        /* Grilla con bordes rectos */
        .compact-table td, .compact-table th { 
            padding: 0.1rem 0.4rem; 
            line-height: 1.1; 
            border: 1px solid black;
        }
        
        .compact-checkbox {
            appearance: none; -webkit-appearance: none;
            width: 1.1rem; height: 1.1rem; border: 2px solid #000;
            background: #fff; cursor: pointer;
            position: relative; transition: all 0.1s;
        }
        .compact-checkbox:checked { background: #D97706; }
        .compact-checkbox:checked::after {
            content: "✓"; color: white; font-size: 0.8rem; font-weight: 900;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        
        .brutal-border { border: 2px solid black; }
        .sticky-header thead th { position: sticky; top: 0; z-index: 20; background: black; color: white; }
        
        .loading-overlay { 
            background: #1E3A8A; 
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Estilos rectos para todo */
        .no-round { border-radius: 0 !important; }

        input, button, select, textarea {
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState("");
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [activeDay, setActiveDay] = useState("LUNES");
            const [searchTerm, setSearchTerm] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isImportOpen, setIsImportOpen] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const days = ["LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES"];
            const todayDate = "15/05";
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'om-attendance-v2';

            // --- Login Logic ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (password.toUpperCase() === "EZE") {
                    setIsAuthenticated(true);
                    localStorage.setItem("om_auth", "true");
                } else {
                    alert("Clave incorrecta");
                }
            };

            useEffect(() => {
                if (localStorage.getItem("om_auth") === "true") {
                    setIsAuthenticated(true);
                }
            }, []);

            // --- Firebase Initialization ---
            useEffect(() => {
                if (!isAuthenticated) return;
                
                const init = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseDB;
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setLoading(false);
                            } else {
                                setError("Sesión no disponible.");
                                setLoading(false);
                            }
                        });
                    } catch (err) {
                        console.error(err);
                        setError("Error de conexión.");
                        setLoading(false);
                    }
                };
                init();
            }, [isAuthenticated]);

            // --- Data Sync ---
            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, onSnapshot } = window.FirebaseDB;
                const db = getFirestore();
                const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                
                const unsubscribe = onSnapshot(studentsRef, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setStudents(data);
                    }, 
                    (err) => {
                        console.error(err);
                        if (err.code === 'permission-denied') setError("Error de permisos.");
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const filteredStudents = useMemo(() => {
                const dayList = students.filter(s => s.dia === activeDay);
                if (!searchTerm) return dayList;
                const term = searchTerm.toLowerCase();
                return dayList.filter(s => 
                    (s.apellido || "").toLowerCase().includes(term) ||
                    (s.nombre || "").toLowerCase().includes(term) ||
                    (s.programa || "").toLowerCase().includes(term)
                );
            }, [students, activeDay, searchTerm]);

            const stats = useMemo(() => {
                const total = filteredStudents.length;
                const pres = filteredStudents.filter(s => s.attendance?.[todayDate]).length;
                return { total, pres, aus: total - pres };
            }, [filteredStudents]);

            // --- Database Actions ---
            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseDB;
                const db = getFirestore();
                const formData = new FormData(e.target);
                const studentId = editingStudent ? editingStudent.id : crypto.randomUUID();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId);
                
                await setDoc(studentRef, {
                    apellido: formData.get("apellido").trim(),
                    nombre: formData.get("nombre").trim(),
                    programa: formData.get("programa").trim(),
                    sala: formData.get("sala").trim(),
                    dia: activeDay,
                    attendance: editingStudent?.attendance || {}
                }, { merge: true });
                setIsModalOpen(false);
                setEditingStudent(null);
            };

            const toggleAttendance = async (student) => {
                if (!user) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseDB;
                const db = getFirestore();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id);
                const currentStatus = student.attendance?.[todayDate] || false;
                await updateDoc(studentRef, { [`attendance.${todayDate}`]: !currentStatus });
            };

            const deleteStudent = async (id) => {
                if (!user || !confirm('¿Eliminar?')) return;
                const { getFirestore, doc, deleteDoc } = window.FirebaseDB;
                const db = getFirestore();
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
            };

            // --- UI Screens ---
            if (!isAuthenticated) return (
                <div className="fixed inset-0 bg-[#1E3A8A] flex flex-col items-center justify-center p-6">
                    <h1 className="om-title text-5xl mb-8 text-[#FFB266]">OTRO MUNDO</h1>
                    <form onSubmit={handleLogin} className="w-full max-w-xs space-y-4">
                        <input 
                            type="password" 
                            placeholder="CLAVE DE ACCESO" 
                            className="w-full p-4 bg-white text-black font-bold uppercase no-round border-4 border-black outline-none"
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            autoFocus
                        />
                        <button className="w-full p-4 bg-black text-white font-black uppercase no-round border-4 border-black hover:bg-yellow-500 hover:text-black transition-colors">
                            INGRESAR
                        </button>
                    </form>
                </div>
            );

            if (loading) return (
                <div className="fixed inset-0 loading-overlay">
                    <div className="om-title text-3xl animate-pulse text-[#FFB266]">INICIANDO...</div>
                </div>
            );

            return (
                <div className="max-w-full mx-auto p-2 md:p-4 text-white min-h-screen relative">
                    {/* Header Compacto */}
                    <header className="flex flex-wrap justify-between items-center mb-4 gap-2 border-b-4 border-black pb-2">
                        <div className="flex items-baseline gap-4">
                            <h1 className="om-title text-3xl md:text-4xl text-[#FFB266]">OTROMUNDO</h1>
                            <span className="text-[10px] font-black uppercase bg-orange-600 px-2 py-0.5 brutal-border">{activeDay} - {todayDate}</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            {/* Contadores Compactos */}
                            <div className="flex gap-4 bg-black/40 px-3 py-1 brutal-border text-[10px] font-black uppercase">
                                <div className="flex gap-1">Artistas: <span className="text-white">{stats.total}</span></div>
                                <div className="flex gap-1">Pres: <span className="text-green-400">{stats.pres}</span></div>
                                <div className="flex gap-1">Aus: <span className="text-red-400">{stats.aus}</span></div>
                            </div>
                            
                            <div className="flex gap-2">
                                <button onClick={() => setIsImportOpen(true)} className="bg-white/10 px-3 py-1 text-[10px] font-bold uppercase brutal-border hover:bg-white/20">Importar</button>
                                <button onClick={() => { setEditingStudent(null); setIsModalOpen(true); }} className="bg-white text-blue-900 px-3 py-1 text-[10px] font-black uppercase brutal-border hover:bg-[#FFB266]">Nuevo</button>
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="bg-red-600 text-white px-3 py-1 text-[10px] font-black uppercase brutal-border">Salir</button>
                            </div>
                        </div>
                    </header>

                    {/* Selectores Grandes (50/50) */}
                    <div className="flex flex-col md:flex-row mb-4 border-4 border-black bg-black">
                        {/* Selector de Días (50%) */}
                        <div className="w-full md:w-1/2 flex">
                            {days.map(day => (
                                <button
                                    key={day}
                                    onClick={() => setActiveDay(day)}
                                    className={`flex-1 py-3 text-[10px] md:text-xs font-black transition-all border-r-2 border-black last:border-r-0 ${
                                        activeDay === day ? "bg-[#FFB266] text-black" : "bg-white/10 text-white/50 hover:text-white"
                                    }`}
                                >
                                    {day}
                                </button>
                            ))}
                        </div>
                        {/* Buscador (50%) */}
                        <div className="w-full md:w-1/2 relative bg-white">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-black/30"></i>
                            <input 
                                type="text" 
                                placeholder="BUSCAR ARTISTA / PROGRAMA..."
                                className="w-full bg-transparent pl-12 pr-4 py-3 text-xs font-bold uppercase text-black outline-none"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </div>

                    {/* Grilla Rectangular (Sin bordes redondeados) */}
                    <div className="bg-white brutal-border no-round">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left compact-table border-collapse">
                                <thead className="sticky-header">
                                    <tr className="bg-black text-white text-[9px] font-black uppercase tracking-widest">
                                        <th className="py-2">Apellido</th>
                                        <th className="py-2">Nombre</th>
                                        <th className="py-2">Programa</th>
                                        <th className="py-2">Sala</th>
                                        <th className="py-2 text-center text-[#FFB266] w-12">√</th>
                                        <th className="py-2 text-right w-16">Acc</th>
                                    </tr>
                                </thead>
                                <tbody className="text-black font-bold text-[10px] divide-y divide-black bg-white">
                                    {filteredStudents.length > 0 ? filteredStudents.map(student => (
                                        <tr key={student.id} className="hover:bg-yellow-50 transition-colors group">
                                            <td className="uppercase whitespace-nowrap">{student.apellido}</td>
                                            <td className="text-black/50 uppercase whitespace-nowrap">{student.nombre}</td>
                                            <td className="uppercase italic text-black/70">{student.programa}</td>
                                            <td className="text-blue-900 font-black uppercase whitespace-nowrap">{student.sala}</td>
                                            <td className="text-center">
                                                <input 
                                                    type="checkbox" 
                                                    className="compact-checkbox no-round"
                                                    checked={!!(student.attendance && student.attendance[todayDate])}
                                                    onChange={() => toggleAttendance(student)}
                                                />
                                            </td>
                                            <td className="text-right">
                                                <div className="flex justify-end gap-1">
                                                    <button onClick={() => { setEditingStudent(student); setIsModalOpen(true); }} className="p-1 hover:bg-blue-100 transition-colors"><i data-lucide="edit-3" className="w-3 h-3 text-blue-900"></i></button>
                                                    <button onClick={() => deleteStudent(student.id)} className="p-1 hover:bg-red-100 transition-colors"><i data-lucide="trash-2" className="w-3 h-3 text-red-600"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="6" className="py-12 text-center text-gray-300 font-black uppercase italic tracking-tighter">Sin registros</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal - Estilo Recto */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-">
                            <div className="bg-white border-8 border-black w-full max-w-md p-8 shadow-[10px_10px_0px_rgba(0,0,0,1)] no-round">
                                <h2 className="text-3xl font-black italic uppercase mb-6 text-black tracking-tighter leading-none">
                                    REGISTRAR <br/> <span className="text-[#D97706]">TALENTO</span>
                                </h2>
                                <form onSubmit={handleAddOrUpdate} className="space-y-4 text-black">
                                    {['apellido', 'nombre', 'programa', 'sala'].map(field => (
                                        <div key={field}>
                                            <label className="text-[9px] font-black uppercase ml-2 text-gray-400 tracking-widest">{field}</label>
                                            <input name={field} required defaultValue={editingStudent ? editingStudent[field] : ""}
                                                className="w-full bg-gray-50 border-4 border-black px-4 py-2 text-xs font-bold uppercase text-black outline-none focus:bg-yellow-50 transition-all no-round" />
                                        </div>
                                    ))}
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black uppercase text-xs text-black hover:bg-gray-200 no-round border-4 border-black">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-black text-white py-4 font-black uppercase text-xs no-round border-4 border-black hover:bg-yellow-500 hover:text-black">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Importar - Estilo Recto */}
                    {isImportOpen && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-">
                            <div className="bg-white border-8 border-black w-full max-w-2xl p-8 shadow-[10px_10px_0px_rgba(0,0,0,1)] no-round">
                                <h2 className="text-3xl font-black italic uppercase mb-2 tracking-tighter leading-none">IMPORTAR <span className="text-[#D97706]">{activeDay}</span></h2>
                                <p className="text-[10px] uppercase font-bold text-gray-400 mb-6 tracking-widest opacity-70 italic">Apellido, Nombre, Programa, Sala</p>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const csvText = e.target.csvData.value;
                                    const lines = csvText.split('\n');
                                    setLoading(true);
                                    const { getFirestore, doc, setDoc } = window.FirebaseDB;
                                    const db = getFirestore();
                                    for (let line of lines) {
                                        const parts = line.split(',');
                                        if (parts.length < 4 || line.toLowerCase().includes('apellido')) continue;
                                        const id = crypto.randomUUID();
                                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                                            apellido: parts.trim(), nombre: parts.trim(), programa: parts.trim(), sala: parts.trim(), dia: activeDay, attendance: {}
                                        });
                                    }
                                    setLoading(false);
                                    setIsImportOpen(false);
                                }} className="space-y-6">
                                    <textarea name="csvData" required className="w-full h-64 bg-gray-50 border-4 border-black p-4 font-mono text-[10px] uppercase outline-none no-round resize-none" placeholder="ALZUALDE,JULIA,LA VOZ EN ESCENA,SEMILLA..."></textarea>
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setIsImportOpen(false)} className="flex-1 py-4 font-black uppercase text-xs text-black border-4 border-black no-round">Cerrar</button>
                                        <button type="submit" className="flex-1 bg-[#D97706] text-white py-4 font-black uppercase text-xs border-4 border-black no-round hover:bg-black">Importar Ahora</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setInterval(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 500);
    </script>
</body>
</html>
