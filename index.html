<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otro Mundo - Gestión Académica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseDB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #1E3A8A; color: white; margin: 0; padding: 0; }
        .om-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; line-height: 0.85; }
        
        /* Grilla con bordes rectos y brutalistas */
        .compact-table td, .compact-table th { 
            padding: 0.1rem 0.4rem; 
            line-height: 1.1; 
            border: 1px solid black;
        }
        
        .compact-checkbox {
            appearance: none; -webkit-appearance: none;
            width: 1.1rem; height: 1.1rem; border: 2px solid #000;
            background: #fff; cursor: pointer;
            position: relative; transition: all 0.1s;
        }
        .compact-checkbox:checked { background: #D97706; }
        .compact-checkbox:checked::after {
            content: "✓"; color: white; font-size: 0.8rem; font-weight: 900;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        
        .brutal-border { border: 2px solid black; }
        .sticky-header thead th { position: sticky; top: 0; z-index: 20; background: black; color: white; }
        
        .loading-overlay { 
            background: #1E3A8A; 
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Estilos rectos para todo el sitio */
        .no-round { border-radius: 0 !important; }
        input, button, select, textarea, div {
            border-radius: 0 !important;
        }

        /* Corregir color de texto en importación */
        .import-textarea {
            color: black !important;
            background-color: white !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [activeDay, setActiveDay] = useState("LUNES");
            const [searchTerm, setSearchTerm] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isImportOpen, setIsImportOpen] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const days = ["LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES"];
            const todayDate = "15/05";
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'om-attendance-v2';

            // --- Lógica de Login ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput.toUpperCase() === "EZE") {
                    setIsAuthenticated(true);
                    localStorage.setItem("om_auth_session", "true");
                } else {
                    alert("Clave incorrecta");
                    setPasswordInput("");
                }
            };

            useEffect(() => {
                if (localStorage.getItem("om_auth_session") === "true") {
                    setIsAuthenticated(true);
                }
            }, []);

            // --- Inicialización Firebase ---
            useEffect(() => {
                if (!isAuthenticated) return;
                
                const init = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseDB;
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setLoading(false);
                            } else {
                                setError("Sesión no disponible.");
                                setLoading(false);
                            }
                        });
                    } catch (err) {
                        console.error(err);
                        setError("Error de conexión.");
                        setLoading(false);
                    }
                };
                init();
            }, [isAuthenticated]);

            // --- Sincronización de Datos ---
            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, onSnapshot } = window.FirebaseDB;
                const db = getFirestore();
                const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                
                const unsubscribe = onSnapshot(studentsRef, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setStudents(data);
                    }, 
                    (err) => {
                        console.error(err);
                        if (err.code === 'permission-denied') setError("Error de permisos.");
                    }
                );
                return () => unsubscribe();
            }, [user, appId]);

            const filteredStudents = useMemo(() => {
                const dayList = students.filter(s => s.dia === activeDay);
                if (!searchTerm) return dayList;
                const term = searchTerm.toLowerCase();
                return dayList.filter(s => 
                    (s.apellido || "").toLowerCase().includes(term) ||
                    (s.nombre || "").toLowerCase().includes(term) ||
                    (s.programa || "").toLowerCase().includes(term)
                );
            }, [students, activeDay, searchTerm]);

            const stats = useMemo(() => {
                const total = filteredStudents.length;
                const pres = filteredStudents.filter(s => s.attendance?.[todayDate]).length;
                return { total, pres, aus: total - pres };
            }, [filteredStudents]);

            // --- Acciones de Base de Datos ---
            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseDB;
                const db = getFirestore();
                const formData = new FormData(e.target);
                const studentId = editingStudent ? editingStudent.id : crypto.randomUUID();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId);
                
                await setDoc(studentRef, {
                    apellido: formData.get("apellido").trim(),
                    nombre: formData.get("nombre").trim(),
                    programa: formData.get("programa").trim(),
                    sala: formData.get("sala").trim(),
                    dia: activeDay,
                    attendance: editingStudent?.attendance || {}
                }, { merge: true });
                setIsModalOpen(false);
                setEditingStudent(null);
            };

            const toggleAttendance = async (student) => {
                if (!user) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseDB;
                const db = getFirestore();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id);
                const currentStatus = student.attendance?.[todayDate] || false;
                await updateDoc(studentRef, { [`attendance.${todayDate}`]: !currentStatus });
            };

            const deleteStudent = async (id) => {
                if (!user || !confirm('¿Eliminar?')) return;
                const { getFirestore, doc, deleteDoc } = window.FirebaseDB;
                const db = getFirestore();
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
            };

            const handleBulkImport = async (e) => {
                e.preventDefault();
                const csvText = e.target.csvData.value;
                const lines = csvText.split('\n');
                
                setLoading(true);
                const { getFirestore, doc, setDoc } = window.FirebaseDB;
                const db = getFirestore();
                
                try {
                    for (let line of lines) {
                        const parts = line.split(',');
                        if (parts.length < 4 || line.toLowerCase().includes('apellido')) continue;
                        const id = crypto.randomUUID();
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                            apellido: (parts || "").trim(), 
                            nombre: (parts || "").trim(), 
                            programa: (parts || "").trim(), 
                            sala: (parts || "").trim(), 
                            dia: activeDay, 
                            attendance: {}
                        });
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                    setIsImportOpen(false);
                }
            };

            // --- Vistas ---
            if (!isAuthenticated) return (
                <div className="fixed inset-0 bg-[#1E3A8A] flex flex-col items-center justify-center p-6">
                    <h1 className="om-title text-5xl mb-8 text-[#FFB266]">OTROMUNDO</h1>
                    <form onSubmit={handleLogin} className="w-full max-w-xs space-y-4">
                        <input 
                            type="password" 
                            placeholder="CLAVE DE ACCESO" 
                            className="w-full p-4 bg-white text-black font-bold uppercase border-4 border-black outline-none no-round"
                            value={passwordInput}
                            onChange={(e) => setPasswordInput(e.target.value)}
                            autoFocus
                        />
                        <button className="w-full p-4 bg-black text-white font-black uppercase border-4 border-black hover:bg-[#FFB266] hover:text-black transition-colors no-round">
                            INGRESAR
                        </button>
                    </form>
                </div>
            );

            if (loading) return (
                <div className="fixed inset-0 loading-overlay">
                    <div className="om-title text-3xl animate-pulse text-[#FFB266]">PROCESANDO...</div>
                </div>
            );

            return (
                <div className="max-w-full mx-auto p-1 md:p-2 text-white min-h-screen relative bg-[#1E3A8A]">
                    {/* Header Compacto */}
                    <header className="flex justify-between items-center mb-2 px-1 border-b-2 border-black pb-1">
                        <div className="flex items-center gap-3">
                            <h1 className="om-title text-2xl md:text-3xl text-[#FFB266]">OTROMUNDO</h1>
                            <div className="bg-black px-2 py-0.5 text-[9px] font-black italic uppercase text-white border border-white/20">
                                {activeDay} • {todayDate}
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            {/* Contadores Compactos en Header */}
                            <div className="flex gap-3 bg-black/40 px-2 py-1 border border-black text-[9px] font-black uppercase">
                                <div className="flex gap-1 items-center">Art: <span className="text-white text-sm">{stats.total}</span></div>
                                <div className="flex gap-1 items-center border-l border-white/10 pl-3">Pre: <span className="text-[#FFB266] text-sm">{stats.pres}</span></div>
                                <div className="flex gap-1 items-center border-l border-white/10 pl-3">Aus: <span className="text-red-400 text-sm">{stats.aus}</span></div>
                            </div>
                            
                            <div className="flex gap-1">
                                <button onClick={() => setIsImportOpen(true)} className="bg-white/10 px-2 py-1 text-[9px] font-bold uppercase border border-black hover:bg-white/20">Importar</button>
                                <button onClick={() => { setEditingStudent(null); setIsModalOpen(true); }} className="bg-white text-blue-900 px-2 py-1 text-[9px] font-black uppercase border border-black hover:bg-[#FFB266]">Nuevo</button>
                                <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="bg-red-700 text-white px-2 py-1 text-[9px] font-black uppercase border border-black">Salir</button>
                            </div>
                        </div>
                    </header>

                    {/* Selectores 50/50 */}
                    <div className="flex flex-col md:flex-row mb-2 border-2 border-black bg-black">
                        {/* Selector de Días (50%) */}
                        <div className="w-full md:w-1/2 flex divide-x divide-black">
                            {days.map(day => (
                                <button
                                    key={day}
                                    onClick={() => setActiveDay(day)}
                                    className={`flex-1 py-2 text-[9px] font-black transition-all ${
                                        activeDay === day ? "bg-[#FFB266] text-black" : "bg-white/5 text-white/40 hover:text-white"
                                    }`}
                                >
                                    {day}
                                </button>
                            ))}
                        </div>
                        {/* Buscador (50%) */}
                        <div className="w-full md:w-1/2 relative bg-white">
                            <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-black/30"></i>
                            <input 
                                type="text" 
                                placeholder="BUSCAR ARTISTA / PROGRAMA..."
                                className="w-full bg-transparent pl-10 pr-3 py-2 text-[10px] font-bold uppercase text-black outline-none placeholder:text-black/20"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </div>

                    {/* Grilla Brutalista (Bordes Rectos) */}
                    <div className="bg-white border-2 border-black overflow-hidden no-round">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left compact-table border-collapse">
                                <thead className="sticky-header">
                                    <tr className="bg-black text-white text-[8px] font-black uppercase tracking-widest">
                                        <th className="py-1.5">Apellido</th>
                                        <th className="py-1.5">Nombre</th>
                                        <th className="py-1.5">Programa</th>
                                        <th className="py-1.5">Sala</th>
                                        <th className="py-1.5 text-center text-[#FFB266] w-10">√</th>
                                        <th className="py-1.5 text-right w-14">Acc</th>
                                    </tr>
                                </thead>
                                <tbody className="text-black font-bold text-[9px] bg-white divide-y divide-black">
                                    {filteredStudents.length > 0 ? filteredStudents.map(student => (
                                        <tr key={student.id} className="hover:bg-yellow-50 transition-colors">
                                            <td className="uppercase whitespace-nowrap">{student.apellido}</td>
                                            <td className="text-black/50 uppercase whitespace-nowrap">{student.nombre}</td>
                                            <td className="uppercase italic text-black/70 truncate max-w-[200px]">{student.programa}</td>
                                            <td className="text-blue-900 font-black uppercase whitespace-nowrap">{student.sala}</td>
                                            <td className="text-center">
                                                <input 
                                                    type="checkbox" 
                                                    className="compact-checkbox"
                                                    checked={!!(student.attendance && student.attendance[todayDate])}
                                                    onChange={() => toggleAttendance(student)}
                                                />
                                            </td>
                                            <td className="text-right">
                                                <div className="flex justify-end gap-1">
                                                    <button onClick={() => { setEditingStudent(student); setIsModalOpen(true); }} className="p-0.5 hover:bg-blue-100"><i data-lucide="edit-3" className="w-3 h-3 text-blue-900"></i></button>
                                                    <button onClick={() => deleteStudent(student.id)} className="p-0.5 hover:bg-red-100"><i data-lucide="trash-2" className="w-3 h-3 text-red-600"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="6" className="py-8 text-center text-gray-300 font-black uppercase italic text-sm">Vacío</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal Registro */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-">
                            <div className="bg-white border-4 border-black w-full max-w-sm p-6 shadow-[8px_8px_0px_rgba(0,0,0,1)] no-round">
                                <h2 className="text-2xl font-black italic uppercase mb-4 text-black leading-none">
                                    GESTIONAR <span className="text-[#D97706]">TALENTO</span>
                                </h2>
                                <form onSubmit={handleAddOrUpdate} className="space-y-3 text-black">
                                    {['apellido', 'nombre', 'programa', 'sala'].map(field => (
                                        <div key={field}>
                                            <label className="text-[8px] font-black uppercase ml-1 text-gray-400">{field}</label>
                                            <input name={field} required defaultValue={editingStudent ? editingStudent[field] : ""}
                                                className="w-full bg-gray-50 border-2 border-black px-3 py-1.5 text-xs font-bold uppercase text-black outline-none no-round" />
                                        </div>
                                    ))}
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3 font-black uppercase text-xs text-black border-2 border-black">Cerrar</button>
                                        <button type="submit" className="flex-1 bg-black text-white py-3 font-black uppercase text-xs border-2 border-black hover:bg-[#D97706]">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Importar */}
                    {isImportOpen && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-">
                            <div className="bg-white border-4 border-black w-full max-w-xl p-6 shadow-[8px_8px_0px_rgba(0,0,0,1)] no-round">
                                <h2 className="text-2xl font-black italic uppercase mb-1 text-black leading-none">IMPORTAR <span className="text-[#D97706]">{activeDay}</span></h2>
                                <p className="text-[9px] uppercase font-bold text-gray-400 mb-4 tracking-tighter italic">Pegar: Apellido, Nombre, Programa, Sala</p>
                                <form onSubmit={handleBulkImport} className="space-y-4">
                                    <textarea 
                                        name="csvData" 
                                        required 
                                        className="import-textarea w-full h-56 border-2 border-black p-4 font-mono text-[10px] uppercase outline-none no-round resize-none" 
                                        placeholder="ALZUALDE,JULIA,LA VOZ EN ESCENA,SEMILLA..."></textarea>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setIsImportOpen(false)} className="flex-1 py-3 font-black uppercase text-xs text-black border-2 border-black">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-[#D97706] text-white py-3 font-black uppercase text-xs border-2 border-black hover:bg-black">Importar ahora</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setInterval(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 500);
    </script>
</body>
</html>
