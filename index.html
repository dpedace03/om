<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otro Mundo - Sistema de Asistencia Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseDB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDocs, onSnapshot, updateDoc, deleteDoc, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #1E3A8A; }
        .om-title { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; font-style: italic; line-height: 0.85; }
        .compact-table td, .compact-table th { padding: 0.15rem 0.5rem; line-height: 1.1; }
        .compact-checkbox {
            appearance: none; -webkit-appearance: none;
            width: 1.2rem; height: 1.2rem; border: 2px solid #000;
            border-radius: 0.25rem; background: #fff; cursor: pointer;
            position: relative; transition: all 0.1s;
        }
        .compact-checkbox:checked { background: #D97706; }
        .compact-checkbox:checked::after {
            content: "✓"; color: white; font-size: 0.8rem; font-weight: 900;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .brutal-border { border: 2px solid black; }
        .sticky-header thead th { position: sticky; top: 0; z-index: 20; }
        .loading-overlay { background: rgba(30, 58, 138, 0.9); z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [activeDay, setActiveDay] = useState("LUNES");
            const [searchTerm, setSearchTerm] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isImportOpen, setIsImportOpen] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [loading, setLoading] = useState(true);

            const days = ["LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES"];
            const todayDate = "15/05";

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            // --- Firebase Config & Auth (Strictly following Rule 3) ---
            useEffect(() => {
                const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseDB;
                
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth Error:", error);
                    }
                };

                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                
                return () => unsubscribe();
            }, []);

            // --- Firestore Sync (Rule 1 & 3) ---
            useEffect(() => {
                if (!user) return;
                const { getFirestore, collection, onSnapshot } = window.FirebaseDB;
                const db = getFirestore();
                
                // Ruta obligatoria: /artifacts/{appId}/public/data/students
                const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                
                const unsubscribe = onSnapshot(studentsRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStudents(data);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
                
                return () => unsubscribe();
            }, [user, appId]);

            // --- Lógica de Negocio ---
            const filteredStudents = useMemo(() => {
                const dayList = students.filter(s => s.dia === activeDay);
                if (!searchTerm) return dayList;
                const term = searchTerm.toLowerCase();
                return dayList.filter(s => 
                    s.apellido?.toLowerCase().includes(term) ||
                    s.nombre?.toLowerCase().includes(term) ||
                    s.programa?.toLowerCase().includes(term)
                );
            }, [students, activeDay, searchTerm]);

            const stats = useMemo(() => {
                const total = filteredStudents.length;
                const pres = filteredStudents.filter(s => s.attendance?.[todayDate]).length;
                return { total, pres, aus: total - pres };
            }, [filteredStudents]);

            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if (!user) return;

                const { getFirestore, doc, setDoc } = window.FirebaseDB;
                const db = getFirestore();
                
                const formData = new FormData(e.target);
                const studentId = editingStudent ? editingStudent.id : crypto.randomUUID();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId);
                
                try {
                    await setDoc(studentRef, {
                        apellido: formData.get("apellido"),
                        nombre: formData.get("nombre"),
                        programa: formData.get("programa"),
                        sala: formData.get("sala"),
                        dia: activeDay,
                        attendance: editingStudent?.attendance || {}
                    }, { merge: true });
                    setIsModalOpen(false);
                    setEditingStudent(null);
                } catch (err) {
                    console.error("Error saving student:", err);
                }
            };

            const toggleAttendance = async (student) => {
                if (!user) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseDB;
                const db = getFirestore();
                
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id);
                const currentStatus = student.attendance?.[todayDate] || false;
                
                try {
                    await updateDoc(studentRef, {
                        [`attendance.${todayDate}`]: !currentStatus
                    });
                } catch (err) {
                    console.error("Error updating attendance:", err);
                }
            };

            const deleteStudent = async (id) => {
                if (!user || !confirm("¿Eliminar este registro permanentemente?")) return;
                const { getFirestore, doc, deleteDoc } = window.FirebaseDB;
                const db = getFirestore();
                const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', id);
                
                try {
                    await deleteDoc(studentRef);
                } catch (err) {
                    console.error("Error deleting student:", err);
                }
            };

            const handleImportCSV = async (e) => {
                e.preventDefault();
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseDB;
                const db = getFirestore();
                
                const csvText = e.target.csvData.value;
                const lines = csvText.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    const parts = lines[i].split(',');
                    if (parts.length < 4) continue;
                    
                    const id = crypto.randomUUID();
                    const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', id);
                    
                    try {
                        await setDoc(studentRef, {
                            apellido: parts.trim(),
                            nombre: parts.trim(),
                            programa: parts.trim(),
                            sala: parts.trim(),
                            dia: activeDay,
                            attendance: {}
                        });
                    } catch (err) {
                        console.error("Error importing line:", i, err);
                    }
                }
                setIsImportOpen(false);
            };

            if (loading) return <div className="fixed inset-0 loading-overlay flex items-center justify-center text-white font-black uppercase tracking-widest italic">Conectando con Otro Mundo...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-6 text-white min-h-screen relative">
                    {/* Fecha - Extremo Superior Izquierdo */}
                    <div className="absolute top-2 left-6 text-[10px] font-black bg-[#D97706] px-3 py-1 rounded-full border-2 border-black shadow-lg z-50">
                        {todayDate}
                    </div>

                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-start mb-6 gap-6 border-b-2 border-white/10 pb-4 mt-6">
                        <div>
                            <h1 className="om-title text-5xl md:text-7xl">
                                <span className="text-[#FFB266]">OTRO</span>
                                <span className="text-[#D97706] ml-3">MUNDO</span>
                            </h1>
                            <p className="text-xs font-bold tracking-[0.3em] mt-1 opacity-60 uppercase">REGISTRO - {activeDay}</p>
                        </div>
                        
                        <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => setIsImportOpen(true)}
                                    className="bg-black/40 border border-white/20 text-white px-4 py-2 rounded-2xl font-bold uppercase text-[10px] hover:bg-white/10 transition-all"
                                >
                                    Importar CSV
                                </button>
                                <button 
                                    onClick={() => { setEditingStudent(null); setIsModalOpen(true); }}
                                    className="bg-white text-blue-900 px-6 py-2.5 rounded-2xl font-black uppercase text-sm hover:bg-[#FFB266] transition-all flex items-center gap-2 brutal-border shadow-md active:scale-95"
                                >
                                    <i data-lucide="plus" className="w-4 h-4"></i> Sumar Artista
                                </button>
                            </div>
                            
                            {/* Estadísticas Grandes */}
                            <div className="flex gap-6 bg-black/40 p-4 rounded-3xl border-2 border-white/10 brutal-border w-full justify-between md:justify-end shadow-inner">
                                <div className="text-center md:px-4 border-r border-white/10">
                                    <p className="text-[10px] font-black uppercase opacity-50 tracking-tighter">Artistas</p>
                                    <p className="text-4xl font-black italic text-white leading-none mt-1">{stats.total}</p>
                                </div>
                                <div className="text-center md:px-4 border-r border-white/10">
                                    <p className="text-[10px] font-black uppercase text-[#FFB266] tracking-tighter">Presentes</p>
                                    <p className="text-4xl font-black italic text-[#FFB266] leading-none mt-1">{stats.pres}</p>
                                </div>
                                <div className="text-center md:px-4">
                                    <p className="text-[10px] font-black uppercase text-red-400 tracking-tighter">Ausentes</p>
                                    <p className="text-4xl font-black italic text-red-400 leading-none mt-1">{stats.aus}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navegación y Búsqueda */}
                    <div className="flex flex-col md:flex-row gap-4 mb-4 items-center">
                        <div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto w-full md:w-auto">
                            {days.map(day => (
                                <button
                                    key={day}
                                    onClick={() => setActiveDay(day)}
                                    className={`px-4 py-2 rounded-xl font-black text-[10px] transition-all whitespace-nowrap ${
                                        activeDay === day ? "bg-[#FFB266] text-black" : "text-white/40 hover:text-white"
                                    }`}
                                >
                                    {day}
                                </button>
                            ))}
                        </div>
                        <div className="flex-1 relative w-full">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30"></i>
                            <input 
                                type="text" 
                                placeholder="BUSCAR POR NOMBRE O PROGRAMA..."
                                className="w-full bg-white/10 border-2 border-white/10 rounded-2xl pl-12 pr-4 py-3 text-sm font-bold uppercase outline-none focus:border-[#FFB266] transition-all"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </div>

                    {/* Tabla */}
                    <div className="bg-white rounded-3xl border-4 border-black overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto max-h-[60vh]">
                            <table className="w-full text-left compact-table border-collapse sticky-header">
                                <thead className="bg-black text-white text-[10px] font-black uppercase tracking-widest border-b-2 border-black">
                                    <tr>
                                        <th className="py-3">Apellido</th>
                                        <th className="py-3">Nombre</th>
                                        <th className="py-3">Programa</th>
                                        <th className="py-3">Sala</th>
                                        <th className="py-3 text-center text-[#FFB266] w-12">√</th>
                                        <th className="py-3 text-right w-16">Acc.</th>
                                    </tr>
                                </thead>
                                <tbody className="text-black font-bold text-xs divide-y divide-black/5">
                                    {filteredStudents.length > 0 ? filteredStudents.map(student => (
                                        <tr key={student.id} className="hover:bg-blue-50 transition-colors group">
                                            <td className="uppercase whitespace-nowrap">{student.apellido}</td>
                                            <td className="text-black/50 uppercase whitespace-nowrap">{student.nombre}</td>
                                            <td className="uppercase text-black/70 italic">{student.programa}</td>
                                            <td className="text-[10px] text-blue-900 font-black uppercase whitespace-nowrap">{student.sala}</td>
                                            <td className="text-center w-12">
                                                <input 
                                                    type="checkbox" 
                                                    className="compact-checkbox"
                                                    checked={!!student.attendance?.[todayDate]}
                                                    onChange={() => toggleAttendance(student)}
                                                />
                                            </td>
                                            <td className="text-right w-16">
                                                <div className="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => { setEditingStudent(student); setIsModalOpen(true); }} className="p-1 hover:bg-yellow-100 rounded-lg"><i data-lucide="edit-2" className="w-3.5 h-3.5 text-blue-900"></i></button>
                                                    <button onClick={() => deleteStudent(student.id)} className="p-1 hover:bg-red-500 hover:text-white rounded-lg"><i data-lucide="trash-2" className="w-3.5 h-3.5 text-red-600"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="6" className="py-20 text-center text-gray-300 italic uppercase">Sin datos guardados en {activeDay}</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Modal Estudiante */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-blue-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-">
                            <div className="bg-white border-4 border-black rounded-[3rem] w-full max-w-md p-8 shadow-2xl">
                                <h2 className="text-3xl font-black italic uppercase mb-6 text-black tracking-tighter">
                                    {editingStudent ? 'Editar' : 'Nuevo'} <span className="text-[#D97706]">Talento</span>
                                </h2>
                                <form onSubmit={handleAddOrUpdate} className="space-y-4 text-black">
                                    {['apellido', 'nombre', 'programa', 'sala'].map(field => (
                                        <div key={field}>
                                            <label className="text-[9px] font-black uppercase ml-4 text-gray-400 italic tracking-widest">{field}</label>
                                            <input name={field} required defaultValue={editingStudent?.[field] || ""}
                                                className="w-full bg-gray-50 border-2 border-black rounded-2xl px-5 py-3 text-sm font-bold uppercase text-black outline-none focus:border-[#D97706]" />
                                        </div>
                                    ))}
                                    <div className="flex gap-3 pt-6">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black uppercase text-xs text-black hover:bg-gray-100 rounded-2xl transition-all">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-black text-white py-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Importación CSV */}
                    {isImportOpen && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-">
                            <div className="bg-white border-4 border-black rounded-[3rem] w-full max-w-2xl p-8 shadow-2xl text-black">
                                <h2 className="text-3xl font-black italic uppercase mb-2 tracking-tighter">Cargar Planilla <span className="text-[#D97706]">{activeDay}</span></h2>
                                <p className="text-[10px] uppercase font-bold text-gray-400 mb-6">Pega el contenido del CSV directamente. Formato: Apellido,Nombre,Programa,Sala</p>
                                <form onSubmit={handleImportCSV} className="space-y-4">
                                    <textarea name="csvData" className="w-full h-64 bg-gray-50 border-2 border-black rounded-2xl p-4 font-mono text-xs uppercase" placeholder="Ej: Alzualde,Julia,La Voz en Escena,Semilla"></textarea>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setIsImportOpen(false)} className="flex-1 py-4 font-black uppercase text-xs text-black hover:bg-gray-100 rounded-2xl transition-all">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-[#D97706] text-white py-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Procesar e Importar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
